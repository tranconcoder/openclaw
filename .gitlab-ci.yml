include:
  - project: tvconss/gitlab-tools
    ref: main
    file: sync-to-github/.gitlab-ci.yml

variables:
  GITHUB_REPO: "openclaw"

deploy:
  stage: deploy
  image: docker:latest
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DEPLOY_FOLDER: "/opt/apps/openclaw"
  before_script:
    - apk add --no-cache rsync
  script:
    - echo "--- Preparing deployment directory ---"
    - mkdir -p $DEPLOY_FOLDER

    - echo "--- Syncing files from CI workspace to server ---"
    - rsync -av --delete
      --exclude '.git'
      --exclude 'openclaw/agents/'
      --exclude 'openclaw/canvas/'
      --exclude 'openclaw/credentials/'
      --exclude 'openclaw/cron/'
      --exclude 'openclaw/devices/paired.json'
      --exclude 'openclaw-gog-config/'
      ./ $DEPLOY_FOLDER/
    - cd $DEPLOY_FOLDER
    - echo "--- Creating .env file from GitLab CI variable ---"
    - cp $ENV_FILE .env

    - echo "--- Creating Google OAuth secret file and config dir ---"
    - mkdir -p openclaw-gog-config
    - 'if [ -n "$GOOGLE_OAUTH_SECRET" ]; then cp $GOOGLE_OAUTH_SECRET google-oauth-secret.json; else echo "WARNING: GOOGLE_OAUTH_SECRET not set"; fi'
    - chown -R 1000:1000 google-oauth-secret.json openclaw-gog-config
    - chmod 600 google-oauth-secret.json
    - chmod 700 openclaw-gog-config

    - echo "--- Restarting Docker Compose ---"
    - docker compose down
    - docker compose up -d --build
  only:
    - master
  tags:
    - docker

stages:
  - sync-to-github
  - deploy