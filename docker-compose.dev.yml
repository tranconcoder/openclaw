services:
  browserless:
    image: browserless/chrome:latest
    container_name: openclaw_browserless_dev
    restart: unless-stopped
    environment:
      - MAX_CONCURRENT_SESSIONS=10
    networks:
      - openclaw-dev-net

  mongodb:
    image: mongo:latest
    container_name: openclaw_mongodb_dev
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - openclaw-dev-net

  job-crawler-api:
    build: ./services/job-crawler-api
    container_name: openclaw_job_crawler_api_dev
    ports:
      - "38080:3000"
    volumes:
      - ./services/job-crawler-api:/app
      - ./services/job-crawler-api/data:/app/data
    environment:
      - BROWSER_WS_URL=ws://browserless:3000
      - MONGODB_URI=mongodb://mongodb:27017/openclaw
    env_file:
      - .env.development
    depends_on:
      - browserless
      - mongodb
    networks:
      - openclaw-dev-net

volumes:
  mongodb_data:

networks:
  openclaw-dev-net:
    driver: bridge
