services:
  openclaw:
    image: alpine/openclaw:main
    container_name: openclaw_gateway_dev
    user: "1000:1000"
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - ./openclaw:/home/node/.openclaw
      - ./openclaw-gog-config:/home/node/.config/gogcli
      - ./google-oauth-secret.json:/home/node/.openclaw/google-oauth-secret.json
    command: 
      - "sh"
      - "-c"
      - |
        mkdir -p /home/node/.local/bin
        if [ ! -f /home/node/.local/bin/gog ]; then
          echo "--- Installing gog CLI ---"
          wget -qO- https://github.com/steipete/gogcli/releases/download/v0.11.0/gogcli_0.11.0_linux_amd64.tar.gz | tar -xzv -C /home/node/.local/bin gog
          chmod +x /home/node/.local/bin/gog
        fi
        if [ -f /home/node/.openclaw/google-oauth-secret.json ]; then
          echo "--- Configuring gog credentials ---"
          gog auth credentials /home/node/.openclaw/google-oauth-secret.json
        fi
        if [ ! -d skills/blogwatcher ]; then
          echo "--- Installing blogwatcher ---"
          env HOME=/tmp npx --yes clawhub install blogwatcher || true
        fi
        mkdir -p /app/skills
        ln -sf /home/node/.openclaw/skills/it-jobs /app/skills/it-jobs
        ln -sf /home/node/.openclaw/skills/it-news /app/skills/it-news
        openclaw gateway
    environment:
      - PATH=/home/node/.local/bin:/root/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - GOG_ACCOUNT=${GOG_ACCOUNT}
      - GOG_KEYRING_BACKEND=file
      - GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD:-openclaw}
    env_file:
      - .env.development
    networks:
      - openclaw-dev-net
    depends_on:
      - mongodb
      - job-crawler-api

  browserless:
    image: browserless/chrome:latest
    container_name: openclaw_browserless_dev
    restart: unless-stopped
    environment:
      - MAX_CONCURRENT_SESSIONS=3
    networks:
      - openclaw-dev-net

  mongodb:
    image: mongo:latest
    container_name: openclaw_mongodb_dev
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - openclaw-dev-net

  job-crawler-api:
    build: ./services/job-crawler-api
    container_name: openclaw_job_crawler_api_dev
    user: "1000:1000"
    ports:
      - "38080:3000"
    volumes:
      - ./services/job-crawler-api:/app
      - ./services/job-crawler-api/data:/app/data
    environment:
      - BROWSER_WS_URL=ws://browserless:3000
      - MONGODB_URI=mongodb://mongodb:27017/openclaw
    env_file:
      - .env.development
    depends_on:
      - browserless
      - mongodb
    networks:
      - openclaw-dev-net

volumes:
  mongodb_data:

networks:
  openclaw-dev-net:
    driver: bridge
