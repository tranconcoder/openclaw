services:
  openclaw:
    image: ${IMAGE_NAME:-openclaw-image}
    build: .
    container_name: openclaw_gateway
    user: "1000:1000"
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - ./openclaw:/home/node/.openclaw
      - ./openclaw-gog-config:/home/node/.config/gogcli
      - ./google-oauth-secret.json:/home/node/.openclaw/google-oauth-secret.json
      - ./skills/it-news:/app/skills/it-news:ro
      - ./skills/openai-whisper/SKILL.md:/app/skills/openai-whisper/SKILL.md:ro
    command: 
      - "sh"
      - "-c"
      - |
        mkdir -p /home/node/.local/bin
        if [ ! -f /home/node/.local/bin/gog ]; then
          echo "--- Installing gog CLI ---"
          wget -qO- https://github.com/steipete/gogcli/releases/download/v0.11.0/gogcli_0.11.0_linux_amd64.tar.gz | tar -xzv -C /home/node/.local/bin gog
          chmod +x /home/node/.local/bin/gog
        fi
        if [ -f /home/node/.openclaw/google-oauth-secret.json ]; then
          echo "--- Configuring gog credentials ---"
          gog auth credentials /home/node/.openclaw/google-oauth-secret.json
        fi
        if [ ! -d skills/blogwatcher ]; then
          echo "--- Installing blogwatcher ---"
          env HOME=/tmp npx --yes clawhub install blogwatcher || true
        fi
        openclaw gateway
    environment:
      - PATH=/home/node/.local/bin:/root/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - GOG_ACCOUNT=${GOG_ACCOUNT}
      - GOG_KEYRING_BACKEND=file
      - GOG_KEYRING_PASSWORD=${GOG_KEYRING_PASSWORD:-openclaw}
    env_file:
      - .env
