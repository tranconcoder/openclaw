services:
  openclaw:
    image: alpine/openclaw:main
    container_name: openclaw_gateway
    restart: unless-stopped
    ports:
      - "18789:18789"
    networks:
      openclaw-net:
        ipv4_address: 172.30.0.10
    volumes:
      - ./openclaw:/home/node/.openclaw
    env_file:
      - .env

networks:
  openclaw-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
