services:
  openclaw:
    image: alpine/openclaw:main
    container_name: openclaw_gateway
    restart: unless-stopped
    network_mode: host
    #ports:
    #  - "127.0.0.1:18789:18789"
    volumes:
      # Mount file config vào đúng đường dẫn mặc định
      - ./data:/home/node/.openclaw
    env_file:
      - .env
